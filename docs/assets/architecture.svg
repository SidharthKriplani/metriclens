<svg viewBox="0 0 1100 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="480" fill="url(#bg)"/>

  <!-- Title bar -->
  <text x="550" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#94a3b8" letter-spacing="3">METRICLENS · DATAFRAME-NATIVE METRIC DECOMPOSITION</text>

  <!-- INPUT NODE -->
  <rect x="20" y="58" width="196" height="165" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="118" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">pandas DataFrame</text>
  <line x1="30" y1="88" x2="206" y2="88" stroke="#475569" stroke-width="0.8"/>
  <text x="118" y="106" text-anchor="middle" font-size="10" fill="#94a3b8">Daily segment-level grain</text>
  <text x="118" y="120" text-anchor="middle" font-size="10" fill="#94a3b8">date · dimensions</text>
  <text x="118" y="134" text-anchor="middle" font-size="10" fill="#94a3b8">numerator · denominator</text>
  <line x1="30" y1="146" x2="206" y2="146" stroke="#475569" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="118" y="162" text-anchor="middle" font-size="9" fill="#64748b">Metric types:</text>
  <text x="118" y="176" text-anchor="middle" font-size="9" fill="#3b82f6">Ratio | Sum | Count | Average</text>
  <rect x="44" y="186" width="150" height="20" rx="4" fill="#0f172a"/>
  <text x="119" y="200" text-anchor="middle" font-size="9.5" fill="#64748b">INPUT</text>

  <!-- Arrow: INPUT -> ENGINE -->
  <line x1="216" y1="140" x2="262" y2="140" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DECOMPOSITION ENGINE -->
  <rect x="265" y="50" width="540" height="365" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="535" y="76" text-anchor="middle" font-size="14" font-weight="700" fill="#3b82f6">MetricLens Decomposition Engine</text>
  <line x1="275" y1="85" x2="795" y2="85" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Lane 1: Mix Decomposition -->
  <text x="283" y="108" font-size="10" font-weight="700" fill="#94a3b8">&#9312; Mix Decomposition</text>
  <rect x="283" y="114" width="238" height="52" rx="4" fill="#0f172a"/>
  <text x="402" y="133" text-anchor="middle" font-size="10" font-weight="600" fill="#e2e8f0">mix_effect</text>
  <text x="402" y="148" text-anchor="middle" font-size="9" fill="#64748b">segment size shifts weighted by</text>
  <text x="402" y="160" text-anchor="middle" font-size="9" fill="#64748b">period-average rate</text>
  <line x1="525" y1="140" x2="553" y2="140" stroke="#475569" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="556" y="114" width="225" height="52" rx="4" fill="#0f172a"/>
  <text x="668" y="133" text-anchor="middle" font-size="9.5" fill="#93c5fd">volume share changed?</text>
  <text x="668" y="148" text-anchor="middle" font-size="9" fill="#64748b">each seg · avg(rate_t, rate_t-1)</text>
  <text x="668" y="160" text-anchor="middle" font-size="9" fill="#64748b">weighted delta-mix attribution</text>

  <!-- Lane 2: Rate Decomposition -->
  <text x="283" y="194" font-size="10" font-weight="700" fill="#94a3b8">&#9313; Rate Decomposition</text>
  <rect x="283" y="200" width="238" height="52" rx="4" fill="#0f172a"/>
  <text x="402" y="219" text-anchor="middle" font-size="10" font-weight="600" fill="#e2e8f0">rate_effect</text>
  <text x="402" y="234" text-anchor="middle" font-size="9" fill="#64748b">rate changes weighted by</text>
  <text x="402" y="246" text-anchor="middle" font-size="9" fill="#64748b">period-average mix</text>
  <line x1="525" y1="226" x2="553" y2="226" stroke="#475569" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="556" y="200" width="225" height="52" rx="4" fill="#0f172a"/>
  <text x="668" y="219" text-anchor="middle" font-size="9.5" fill="#93c5fd">performance within segment changed?</text>
  <text x="668" y="234" text-anchor="middle" font-size="9" fill="#64748b">each seg · avg(mix_t, mix_t-1)</text>
  <text x="668" y="246" text-anchor="middle" font-size="9" fill="#64748b">weighted delta-rate attribution</text>

  <!-- Lane 3: Cross Term -->
  <text x="283" y="280" font-size="10" font-weight="700" fill="#94a3b8">&#9314; Cross Term</text>
  <rect x="283" y="286" width="238" height="52" rx="4" fill="#0f172a"/>
  <text x="402" y="305" text-anchor="middle" font-size="10" font-weight="600" fill="#e2e8f0">cross_term</text>
  <text x="402" y="320" text-anchor="middle" font-size="9" fill="#64748b">interaction: mix × rate joint effect</text>
  <text x="402" y="332" text-anchor="middle" font-size="9" fill="#64748b">always reported — exact identity</text>
  <line x1="525" y1="312" x2="553" y2="312" stroke="#475569" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="556" y="286" width="225" height="52" rx="4" fill="#0f172a"/>
  <text x="668" y="305" text-anchor="middle" font-size="9.5" fill="#93c5fd">mix + rate + cross = total delta</text>
  <text x="668" y="320" text-anchor="middle" font-size="9" fill="#64748b">exact identity · no residual</text>
  <text x="668" y="332" text-anchor="middle" font-size="9" fill="#64748b">omitting breaks the accounting</text>

  <!-- Metric Registry box inside engine -->
  <rect x="283" y="352" width="498" height="46" rx="4" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="532" y="372" text-anchor="middle" font-size="10" font-weight="700" fill="#22c55e">Metric Registry</text>
  <text x="532" y="388" text-anchor="middle" font-size="9" fill="#86efac">explicit denominator logic · conflict detection · config-hashed definitions</text>

  <!-- Arrows: ENGINE -> OUTPUTS -->
  <line x1="805" y1="110" x2="852" y2="110" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="805" y1="226" x2="852" y2="226" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="805" y1="342" x2="852" y2="342" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- OUTPUT 1: DecompositionReport -->
  <rect x="855" y="72" width="222" height="75" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="966" y="95" text-anchor="middle" font-size="11" font-weight="700" fill="#22c55e">DecompositionReport</text>
  <line x1="865" y1="103" x2="1067" y2="103" stroke="#22c55e" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="966" y="119" text-anchor="middle" font-size="9.5" fill="#86efac">mix_effect · rate_effect · cross_effect</text>
  <text x="966" y="133" text-anchor="middle" font-size="9.5" fill="#86efac">waterfall attribution by segment</text>

  <!-- OUTPUT 2: JSON/MD/HTML -->
  <rect x="855" y="188" width="222" height="75" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="966" y="211" text-anchor="middle" font-size="11" font-weight="700" fill="#3b82f6">JSON · Markdown · HTML</text>
  <line x1="865" y1="219" x2="1067" y2="219" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="966" y="235" text-anchor="middle" font-size="9.5" fill="#93c5fd">waterfall chart data</text>
  <text x="966" y="249" text-anchor="middle" font-size="9.5" fill="#93c5fd">segment-level breakdown</text>

  <!-- OUTPUT 3: CLI / API -->
  <rect x="855" y="304" width="222" height="75" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="966" y="327" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8">CLI / API</text>
  <line x1="865" y1="335" x2="1067" y2="335" stroke="#475569" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="966" y="351" text-anchor="middle" font-size="9.5" fill="#64748b">decompose(df, metric_col, dims)</text>
  <text x="966" y="365" text-anchor="middle" font-size="9.5" fill="#64748b">MetricLens().run()</text>

  <!-- Bottom stats bar -->
  <rect x="20" y="432" width="1060" height="36" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="95" y="449" text-anchor="middle" font-size="9" fill="#64748b">METRIC TYPES</text>
  <text x="95" y="462" text-anchor="middle" font-size="10" font-weight="700" fill="#3b82f6">4 supported</text>
  <rect x="210" y="438" width="1" height="20" fill="#334155"/>
  <text x="300" y="449" text-anchor="middle" font-size="9" fill="#64748b">DECOMPOSITION</text>
  <text x="300" y="462" text-anchor="middle" font-size="10" font-weight="700" fill="#a855f7">Mix + Rate + Cross</text>
  <rect x="410" y="438" width="1" height="20" fill="#334155"/>
  <text x="480" y="449" text-anchor="middle" font-size="9" fill="#64748b">TESTS</text>
  <text x="480" y="462" text-anchor="middle" font-size="10" font-weight="700" fill="#22c55e">19/19 passing</text>
  <rect x="570" y="438" width="1" height="20" fill="#334155"/>
  <text x="660" y="449" text-anchor="middle" font-size="9" fill="#64748b">DEPENDENCIES</text>
  <text x="660" y="462" text-anchor="middle" font-size="10" font-weight="700" fill="#f59e0b">pandas only</text>
  <rect x="760" y="438" width="1" height="20" fill="#334155"/>
  <text x="840" y="449" text-anchor="middle" font-size="9" fill="#64748b">IDENTITY</text>
  <text x="840" y="462" text-anchor="middle" font-size="10" font-weight="700" fill="#22c55e">exact · no residual</text>
  <rect x="920" y="438" width="1" height="20" fill="#334155"/>
  <text x="990" y="449" text-anchor="middle" font-size="9" fill="#64748b">OUTPUT</text>
  <text x="990" y="462" text-anchor="middle" font-size="10" font-weight="700" fill="#94a3b8">JSON · MD · HTML</text>
</svg>
