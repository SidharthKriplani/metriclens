<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="900" height="320" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="white" font-size="18" font-weight="bold">MetricLens — Metric Movement Decomposition</text>
  <text x="450" y="48" text-anchor="middle" fill="#94a3b8" font-size="11">Exact identity: mix + rate + cross = total_delta · DataFrame-native · 19/19 tests passing</text>

  <!-- Input Node -->
  <rect x="14" y="68" width="162" height="68" rx="12" fill="#334155" filter="url(#shadow)"/>
  <text x="95" y="88" text-anchor="middle" fill="white" font-size="11" font-weight="bold">pandas DataFrame</text>
  <text x="95" y="102" text-anchor="middle" fill="#94a3b8" font-size="8">daily segment grain</text>
  <text x="95" y="114" text-anchor="middle" fill="#94a3b8" font-size="8">numerator · denominator</text>
  <text x="95" y="126" text-anchor="middle" fill="#94a3b8" font-size="8">date · dimensions</text>

  <!-- Arrow input → metric type -->
  <line x1="176" y1="102" x2="206" y2="102" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Metric Type node (blue) -->
  <rect x="208" y="68" width="170" height="68" rx="12" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="293" y="88" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Metric Type</text>
  <text x="293" y="103" text-anchor="middle" fill="#93c5fd" font-size="9">RatioMetric · SumMetric</text>
  <text x="293" y="116" text-anchor="middle" fill="#93c5fd" font-size="9">CountMetric · AverageMetric</text>

  <!-- Arrow metric type → validation -->
  <line x1="378" y1="102" x2="408" y2="102" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Input Validation node (green) -->
  <rect x="410" y="68" width="170" height="68" rx="12" fill="#065f46" filter="url(#shadow)"/>
  <text x="495" y="88" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Input Validation</text>
  <text x="495" y="103" text-anchor="middle" fill="#6ee7b7" font-size="8">null fill · zero-fill</text>
  <text x="495" y="115" text-anchor="middle" fill="#6ee7b7" font-size="8">new segment detection</text>

  <!-- Arrow validation → decomposition -->
  <line x1="495" y1="136" x2="495" y2="155" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decomposition Engine (violet, center) -->
  <rect x="280" y="157" width="420" height="72" rx="12" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="490" y="174" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Decomposition Engine</text>

  <!-- 3 sub-boxes inside -->
  <rect x="292" y="179" width="118" height="40" rx="8" fill="#4c1d95"/>
  <text x="351" y="196" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="bold">mix_effect</text>
  <text x="351" y="210" text-anchor="middle" fill="#a78bfa" font-size="7">volume shift</text>

  <rect x="420" y="179" width="118" height="40" rx="8" fill="#4c1d95"/>
  <text x="479" y="196" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="bold">rate_effect</text>
  <text x="479" y="210" text-anchor="middle" fill="#a78bfa" font-size="7">rate shift</text>

  <rect x="548" y="179" width="140" height="40" rx="8" fill="#4c1d95"/>
  <text x="618" y="196" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="bold">cross_term</text>
  <text x="618" y="210" text-anchor="middle" fill="#a78bfa" font-size="7">interaction (exact)</text>

  <!-- Formula below engine -->
  <text x="490" y="246" text-anchor="middle" fill="#e2e8f0" font-size="9">Σ mix + rate + cross = total_delta  (exact · no residual)</text>

  <!-- Arrow engine → output -->
  <line x1="700" y1="193" x2="730" y2="193" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output node -->
  <rect x="732" y="155" width="152" height="56" rx="12" fill="#374151" filter="url(#shadow)"/>
  <text x="808" y="174" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Segment Rankings</text>
  <text x="808" y="188" text-anchor="middle" fill="#d1d5db" font-size="8">JSON · Markdown · HTML</text>
  <text x="808" y="202" text-anchor="middle" fill="#9ca3af" font-size="7">sorted by |total_effect|</text>

  <!-- Caution note -->
  <rect x="732" y="218" width="152" height="30" rx="8" fill="#78350f"/>
  <text x="808" y="231" text-anchor="middle" fill="#fcd34d" font-size="8" font-weight="bold">⚠ Decomposition only</text>
  <text x="808" y="243" text-anchor="middle" fill="#fde68a" font-size="7">no causality · no significance</text>

  <!-- Bottom bar -->
  <rect x="0" y="258" width="900" height="62" fill="#0f172a" opacity="0.9"/>
  <text x="450" y="278" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="bold">pip install metriclens · Exact identity · DataFrame-native · 19/19 tests passing</text>
  <text x="450" y="298" text-anchor="middle" fill="#64748b" font-size="10">github.com/SidharthKriplani/metriclens</text>
  <rect x="776" y="283" width="110" height="18" rx="6" fill="#1d4ed8"/>
  <text x="831" y="296" text-anchor="middle" fill="white" font-size="9">PyPI: metriclens</text>
</svg>
