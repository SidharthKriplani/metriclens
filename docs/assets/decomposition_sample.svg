<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="560" fill="url(#bg)"/>

  <!-- HEADER BAR — dark red (metric dropped) -->
  <rect x="0" y="0" width="1000" height="82" rx="0" fill="#450a0a"/>
  <rect x="0" y="74" width="1000" height="8" fill="#1e293b"/>

  <!-- DECOMPOSED badge -->
  <rect x="20" y="18" width="100" height="26" rx="5" fill="#3b82f6"/>
  <text x="70" y="36" text-anchor="middle" font-size="11" font-weight="800" fill="#eff6ff">DECOMPOSED</text>

  <!-- Headline -->
  <text x="130" y="30" font-size="11" fill="#fca5a5" font-weight="600">Revenue -3.2% explained</text>
  <text x="130" y="46" font-size="9.5" fill="#7f1d1d">3 dimensions · causality not inferred</text>

  <!-- Center title -->
  <text x="500" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#fee2e2">MetricLens — Revenue Decomposition · Oct 2024</text>
  <text x="500" y="48" text-anchor="middle" font-size="10.5" fill="#f87171">3 dimensions · 28 segments · Query-ID: ML-2024-1001 · 89ms</text>

  <!-- Right meta badges -->
  <rect x="800" y="14" width="60" height="18" rx="4" fill="#1e3a5f"/>
  <text x="830" y="27" text-anchor="middle" font-size="8.5" fill="#93c5fd">Mix Shift</text>
  <rect x="866" y="14" width="60" height="18" rx="4" fill="#1c1917"/>
  <text x="896" y="27" text-anchor="middle" font-size="8.5" fill="#fca5a5">Rate Shift</text>
  <rect x="932" y="14" width="52" height="18" rx="4" fill="#1e293b"/>
  <text x="958" y="27" text-anchor="middle" font-size="8.5" fill="#94a3b8">Cross Term</text>
  <text x="910" y="55" text-anchor="middle" font-size="9" fill="#64748b">Mix + Rate + Cross = Total</text>

  <!-- LEFT PANEL: Waterfall breakdown — x=20, width=520 -->
  <rect x="20" y="96" width="520" height="346" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Total Change headline -->
  <text x="38" y="122" font-size="11" font-weight="700" fill="#94a3b8">TOTAL CHANGE</text>
  <text x="38" y="148" font-size="22" font-weight="800" fill="#ef4444">Revenue: -$142K (-3.2%)</text>
  <text x="38" y="166" font-size="9.5" fill="#64748b">Oct 2024 vs Sep 2024 · segment-level grain · Ratio metric</text>
  <line x1="30" y1="176" x2="530" y2="176" stroke="#334155" stroke-width="0.8"/>

  <!-- Attribution table header -->
  <text x="38" y="196" font-size="9" font-weight="700" fill="#64748b">COMPONENT</text>
  <text x="230" y="196" font-size="9" font-weight="700" fill="#64748b">EFFECT</text>
  <text x="310" y="196" font-size="9" font-weight="700" fill="#64748b">$ IMPACT</text>
  <text x="400" y="196" font-size="9" font-weight="700" fill="#64748b">DRIVER</text>
  <line x1="30" y1="202" x2="530" y2="202" stroke="#334155" stroke-width="0.8"/>

  <!-- Row 1: Mix Shift — 42px tall -->
  <rect x="30" y="208" width="500" height="42" rx="3" fill="#1e1a00" stroke="#78350f" stroke-width="0.5"/>
  <rect x="36" y="214" width="140" height="28" rx="3" fill="#451a03"/>
  <text x="40" y="233" font-size="10" font-weight="600" fill="#f59e0b">Mix Shift</text>
  <text x="230" y="233" font-size="10" font-weight="700" fill="#fbbf24">-1.8%</text>
  <text x="310" y="233" font-size="10" fill="#fbbf24">-$80K</text>
  <text x="400" y="226" font-size="8.5" fill="#d97706">India grew (lower ARPU),</text>
  <text x="400" y="240" font-size="8.5" fill="#d97706">US shrank</text>

  <!-- Row 2: Rate Shift — 42px tall -->
  <rect x="30" y="256" width="500" height="42" rx="3" fill="#1a0000" stroke="#7f1d1d" stroke-width="0.5"/>
  <rect x="36" y="262" width="140" height="28" rx="3" fill="#450a0a"/>
  <text x="40" y="281" font-size="10" font-weight="600" fill="#ef4444">Rate Shift</text>
  <text x="230" y="281" font-size="10" font-weight="700" fill="#fca5a5">-1.4%</text>
  <text x="310" y="281" font-size="10" fill="#fca5a5">-$63K</text>
  <text x="400" y="272" font-size="8.5" fill="#f87171">Checkout conversion</text>
  <text x="400" y="286" font-size="8.5" fill="#f87171">dropped in all markets</text>

  <!-- Row 3: Cross Term — 42px tall -->
  <rect x="30" y="304" width="500" height="42" rx="3" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
  <rect x="36" y="310" width="140" height="28" rx="3" fill="#1e293b"/>
  <text x="40" y="329" font-size="10" font-weight="600" fill="#64748b">Cross Term</text>
  <text x="230" y="329" font-size="10" fill="#94a3b8">+0.0%</text>
  <text x="310" y="329" font-size="10" fill="#94a3b8">+$1K</text>
  <text x="400" y="329" font-size="8.5" fill="#475569">Negligible interaction</text>

  <!-- Divider -->
  <line x1="30" y1="350" x2="530" y2="350" stroke="#334155" stroke-width="1"/>

  <!-- Row 4: Total — 42px tall -->
  <rect x="30" y="354" width="500" height="42" rx="3" fill="#1a0a0a" stroke="#ef4444" stroke-width="0.8"/>
  <text x="40" y="379" font-size="10" font-weight="800" fill="#fca5a5">TOTAL</text>
  <text x="230" y="379" font-size="10" font-weight="800" fill="#ef4444">-3.2%</text>
  <text x="310" y="379" font-size="10" font-weight="800" fill="#ef4444">-$142K</text>
  <text x="400" y="379" font-size="8.5" fill="#f87171">Mix dominates (56% of drop)</text>

  <!-- Bar chart visual -->
  <text x="38" y="414" font-size="9" fill="#64748b">ATTRIBUTION BREAKDOWN</text>
  <!-- Amber bar for mix -->
  <rect x="38" y="420" width="170" height="12" rx="2" fill="#d97706"/>
  <text x="214" y="430" font-size="8.5" fill="#fbbf24">-1.8% mix</text>
  <!-- Red bar for rate -->
  <rect x="38" y="436" width="134" height="12" rx="2" fill="#dc2626"/>
  <text x="178" y="446" font-size="8.5" fill="#fca5a5">-1.4% rate</text>

  <!-- RIGHT PANEL: Top contributing segments — x=560, width=420 -->
  <rect x="560" y="96" width="420" height="346" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="578" y="122" font-size="11" font-weight="700" fill="#94a3b8">TOP CONTRIBUTING SEGMENTS</text>
  <text x="578" y="138" font-size="9" fill="#475569">sorted by absolute total_effect · investigation priority</text>
  <line x1="570" y1="146" x2="970" y2="146" stroke="#334155" stroke-width="0.8"/>

  <!-- Segment 1 -->
  <rect x="570" y="154" width="400" height="80" rx="6" fill="#1e1a00" stroke="#78350f" stroke-width="1"/>
  <text x="586" y="176" font-size="11" font-weight="700" fill="#f59e0b">1. India_Mobile</text>
  <rect x="830" y="158" width="130" height="22" rx="4" fill="#451a03"/>
  <text x="895" y="173" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fbbf24">-$45K total</text>
  <text x="586" y="196" font-size="9.5" fill="#d97706">Mix grew: +8pp (segment share expanded)</text>
  <text x="586" y="212" font-size="9.5" fill="#fca5a5">Rate fell: -2.1% ARPU</text>
  <!-- Mini bar -->
  <rect x="586" y="218" width="100" height="6" rx="2" fill="#d97706"/>
  <rect x="688" y="218" width="60" height="6" rx="2" fill="#dc2626"/>

  <!-- Segment 2 -->
  <rect x="570" y="244" width="400" height="80" rx="6" fill="#1a0000" stroke="#7f1d1d" stroke-width="1"/>
  <text x="586" y="266" font-size="11" font-weight="700" fill="#ef4444">2. US_Desktop</text>
  <rect x="830" y="248" width="130" height="22" rx="4" fill="#450a0a"/>
  <text x="895" y="263" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fca5a5">-$38K total</text>
  <text x="586" y="286" font-size="9.5" fill="#fbbf24">Mix fell: -5pp (segment share contracted)</text>
  <text x="586" y="302" font-size="9.5" fill="#fca5a5">Rate fell: -0.8% conversion</text>
  <rect x="586" y="308" width="60" height="6" rx="2" fill="#78350f"/>
  <rect x="648" y="308" width="36" height="6" rx="2" fill="#dc2626"/>

  <!-- Segment 3 -->
  <rect x="570" y="334" width="400" height="80" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="586" y="356" font-size="11" font-weight="700" fill="#94a3b8">3. EU_Mobile</text>
  <rect x="830" y="338" width="130" height="22" rx="4" fill="#1e293b"/>
  <text x="895" y="353" text-anchor="middle" font-size="9.5" font-weight="700" fill="#94a3b8">-$21K total</text>
  <text x="586" y="376" font-size="9.5" fill="#64748b">Mix stable (~0pp shift)</text>
  <text x="586" y="392" font-size="9.5" fill="#fca5a5">Rate fell: -3.2% — worst rate decline</text>
  <rect x="586" y="398" width="4" height="6" rx="2" fill="#475569"/>
  <rect x="592" y="398" width="80" height="6" rx="2" fill="#dc2626"/>

  <!-- Interpretation note — spans full width -->
  <rect x="20" y="456" width="960" height="48" rx="6" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="36" y="474" font-size="9.5" fill="#475569">&#9888;  INTERPRETATION NOTE: Decomposition only. No causality inferred. No statistical significance. Use as investigation signals, not decisions.</text>
  <text x="36" y="492" font-size="9" fill="#334155">mix + rate + cross = total delta exactly. No residual. All 28 segments reported in full output.</text>

  <!-- FOOTER -->
  <rect x="0" y="516" width="1000" height="44" fill="#0f172a"/>
  <text x="500" y="534" text-anchor="middle" font-size="9.5" fill="#475569" letter-spacing="2">METRICLENS · DataFrame-native metric decomposition · No LLM dependency · pandas only</text>
  <text x="500" y="550" text-anchor="middle" font-size="9" fill="#334155">github.com/SidharthKriplani/metriclens</text>
</svg>
